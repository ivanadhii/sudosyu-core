services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sudosyu
      POSTGRES_USER: sudosyu
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sudosyu_secret}
      TZ: Asia/Jakarta
      PGTZ: Asia/Jakarta
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sudosyu -d sudosyu"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://sudosyu:${DB_PASSWORD:-sudosyu_secret}@db:5432/sudosyu?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      TZ: Asia/Jakarta

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8080
      TZ: Asia/Jakarta

volumes:
  timescale_data:
